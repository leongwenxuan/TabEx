<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabX</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="logo">TabX</span>
    <span class="status" id="status-badge" data-status="disconnected">●</span>
    <span class="status-label" id="status-label">disconnected</span>
  </div>

  <div class="tabs-section">
    <div class="section-title">Open Tabs</div>
    <div id="tabs-list" class="tab-list"></div>
  </div>

  <div class="section-divider"></div>

  <div class="closed-section">
    <div class="section-title">Recently Closed <span class="hint">(undo)</span></div>
    <div id="closed-list" class="tab-list"></div>
    <div id="no-closed" class="empty-hint hidden">No recently closed tabs.</div>
  </div>

  <div class="section-divider"></div>

  <div class="controls-section">
    <div class="section-title">Controls</div>

    <label class="control-row">
      <span>Auto-close flagged tabs</span>
      <input type="checkbox" id="auto-close-toggle" />
    </label>

    <label class="control-row">
      <span>Tab limit</span>
      <input type="number" id="tab-limit" min="1" max="999" placeholder="none" class="small-input" />
    </label>

    <div class="safelist-area">
      <div class="safelist-title">Don't-close rules</div>
      <div id="safelist-rules"></div>
      <div class="add-rule-row">
        <input type="text" id="new-rule-value" placeholder="domain or url prefix" class="rule-input" />
        <select id="new-rule-type" class="rule-type-select">
          <option value="domain">domain</option>
          <option value="url_prefix">url prefix</option>
          <option value="url_pattern">regex</option>
        </select>
        <button id="add-rule-btn" class="btn-small">Add</button>
      </div>
    </div>

    <button id="get-bundle-btn" class="btn-primary">Get Context Bundle</button>
  </div>

  <div id="bundle-output" class="bundle-area hidden">
    <div class="section-title">Context Bundle</div>
    <pre id="bundle-content" class="bundle-pre"></pre>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
