<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabX</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- ── Header ─────────────────────────────────────── -->
    <div class="header">
      <div class="header-title">
        <span class="logo">TabX</span>
      </div>
      <div>
        <span class="status status-disconnected" id="status-badge">●</span>
        <span class="status-label" id="status-label">disconnected</span>
      </div>
    </div>

    <!-- ── Nav tabs ───────────────────────────────────── -->
    <nav class="tabs-nav">
      <button class="tab-btn active" data-panel="panel-open">Open</button>
      <button class="tab-btn" data-panel="panel-closed">Closed</button>
      <button class="tab-btn" data-panel="panel-settings">Settings</button>
    </nav>

    <!-- ── Open tabs panel ───────────────────────────── -->
    <div id="panel-open" class="panel active">
      <div id="restore-banner-container" class="hidden"></div>
      <div class="tab-list" id="tabs-list"></div>
    </div>

    <!-- ── Recently closed panel ─────────────────────── -->
    <div id="panel-closed" class="panel">
      <div class="tab-list" id="closed-list"></div>
    </div>

    <!-- ── Settings panel ────────────────────────────── -->
    <div id="panel-settings" class="panel">
      <div class="settings-group">
        <label class="settings-label" for="auto-close-toggle">Auto-close flagged tabs</label>
        <input type="checkbox" id="auto-close-toggle" class="toggle" />
      </div>

      <div class="settings-group">
        <label class="settings-label" for="auto-restore-toggle">Auto-restore branch sessions</label>
        <input type="checkbox" id="auto-restore-toggle" class="toggle" />
      </div>

      <div class="settings-group">
        <label class="settings-label" for="tab-limit">Tab limit</label>
        <input
          type="number"
          id="tab-limit"
          class="number-input"
          min="1"
          max="999"
          placeholder="none"
        />
      </div>

      <div class="settings-group">
        <span class="settings-label">Don't-close rules</span>
        <div class="rules-list" id="safelist-rules"></div>
        <div class="add-rule-form">
          <select id="new-rule-type" class="rule-type-select">
            <option value="domain">domain</option>
            <option value="url_prefix">url prefix</option>
            <option value="url_pattern">regex</option>
          </select>
          <input
            type="text"
            id="new-rule-value"
            class="rule-value-input"
            placeholder="e.g. github.com"
          />
          <button id="add-rule-btn" class="btn btn-secondary">Add</button>
        </div>
      </div>

      <div class="settings-group">
        <span class="settings-label">AI Agent</span>
        <p class="settings-hint">Configure your OpenAI API key via terminal:<br>
          <code>tabx-host --set-key YOUR_KEY</code></p>
      </div>

      <button id="get-bundle-btn" class="btn btn-primary save-btn">Get Context Bundle</button>
    </div>

    <!-- ── Bundle output ─────────────────────────────── -->
    <div id="bundle-output" class="bundle-area hidden">
      <pre id="bundle-content" class="bundle-pre"></pre>
    </div>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
